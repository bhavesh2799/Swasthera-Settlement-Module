kind = "web"
previewPath = "/"
title = "Swasthera Settlement Module"
version = "1.0.0"
id = "artifacts/swasthera"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20381

[services.development]
run = "pnpm --filter @workspace/swasthera run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/swasthera", "run", "build" ]
publicDir = "artifacts/swasthera/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20381"
BASE_PATH = "/"
